name: Build All Features APK

on:
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - build-all-features

permissions:
  contents: write

jobs:
  merge-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          repository: sunsanxingkong/WeKit
          ref: build-all-features
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android,x86_64-linux-android,armv7-linux-androideabi,i686-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: app/src/main/rust/wekit-native -> target

      - name: Cache Gradle build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt install -y gcc-multilib

      - name: Build Release (Unsigned)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew assembleRelease --warning-mode all --stacktrace

      - name: Upload Release APKs
        uses: actions/upload-artifact@v7
        with:
          name: wekit-all-features-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Release Obfuscation Mapping
        uses: actions/upload-artifact@v7
        with:
          name: wekit-all-features-mapping
          path: app/build/outputs/mapping/release/mapping.txt

      - name: Create Release with APK
        uses: softprops/action-gh-release@v3
        with:
          tag_name: all-features-ci-${{ github.run_number }}
          name: "WeKit All Features Build #${{ github.run_number }}"
          body: |
            ## 📦 WeKit All Features - 自动构建

            ### ✨ 包含的新功能

            **1. AI 回复 (PR #87)**
            - 聊天工具栏中添加 ✨ AI 回复 芯片
            - 读取聊天上下文，调用 OpenAI 兼容 API 回复
            - 可配置 API 地址、Key、模型、温度、提示词等

            **2. 批量删除好友 & 批量退出群聊 (PR #88)**
            - 首页右上角「+」菜单新增两个入口
            - 支持全选/反选/清空
            - 可调节操作间隔
            - 执行前三次确认提示
            - 实时进度条

            **3. 屏蔽群成员消息 (PR #89)**
            - 屏蔽指定群成员的所有消息（文字/图片/红包等）
            - 永久屏蔽 / 临时屏蔽（自动过期）
            - 批量管理面板（搜索昵称/wxid 勾选屏蔽）

            **4. 自动转发朋友圈 (PR #90)**
            - 监控指定好友朋友圈
            - 匹配关键词自动转发到自己的朋友圈
            - 可设置检测时段和间隔
            - 自动去重

            > 构建时间: ${{ github.event.repository.updated_at }}
            > 提交: ${{ github.sha }}
          files: |
            app/build/outputs/apk/release/*.apk
          prerelease: true
